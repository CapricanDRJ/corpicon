<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corp Badge Builder</title>
<style>
  :root {
    --bg: #070b12;
    --panel: #111826;
    --panel2: #0d1420;
    --line: #223044;
    --text: #cdd9e5;
    --muted: #6b7c93;
    --accent: #40cdfe;
    --hover: #1a2434;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background:
      radial-gradient(1200px 600px at 15% -10%, #16233c 0%, transparent 55%),
      radial-gradient(900px 500px at 100% 0%, #241a3a 0%, transparent 50%),
      var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px 56px;
  }
  header { text-align: center; margin-bottom: 26px; }
  .eyebrow {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px; letter-spacing: 0.34em; text-transform: uppercase;
    color: var(--accent); margin: 0 0 6px;
  }
  h1 {
    margin: 0; font-size: 27px; font-weight: 700; letter-spacing: -0.01em;
    background: linear-gradient(90deg, #7fe3ff, #b79bff 70%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .app { display: flex; gap: 28px; align-items: flex-start; width: 100%; max-width: 820px; }
  .viewport {
    flex: 0 0 300px; position: sticky; top: 20px;
    background: linear-gradient(180deg, var(--panel), var(--panel2));
    border: 1px solid var(--line); border-radius: 14px; padding: 16px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    box-shadow: 0 0 40px -20px var(--accent);
  }
  #stage {
    width: 268px; height: 268px; border-radius: 8px;
    background:
      linear-gradient(45deg, #0d131c 25%, transparent 25%) -8px 0/16px 16px,
      linear-gradient(-45deg, #0d131c 25%, transparent 25%) -8px 0/16px 16px,
      linear-gradient(45deg, transparent 75%, #0d131c 75%) -8px 0/16px 16px,
      linear-gradient(-45deg, transparent 75%, #0d131c 75%) -8px 0/16px 16px,
      #10161f;
  }
  button.action {
    width: 100%; border: none; border-radius: 9px; cursor: pointer;
    padding: 11px 14px; font-size: 14px; font-weight: 700; color: #04202b;
    background: linear-gradient(180deg, #6fe0ff, var(--accent));
  }
  button.action:hover { filter: brightness(1.07); }
  button.action:focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }

  .controls { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 18px; }
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field > label {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
  }

  .grid-icons {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(54px, 1fr));
    gap: 7px; padding: 8px; max-height: 210px; overflow-y: auto;
    background: var(--panel2); border: 1px solid var(--line); border-radius: 10px;
  }
  .grid-colors { display: flex; flex-wrap: wrap; gap: 7px; }

  .tile {
    position: relative; font: inherit; color: var(--text); cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 6px 4px; border: 1px solid transparent; border-radius: 9px;
    background: transparent; transition: transform .12s ease, background .12s ease;
  }
  .tile:hover { background: var(--hover); transform: translateY(-1px); }
  .tile:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .tile.sel {
    background: var(--hover);
    border-color: var(--glow, var(--accent));
    box-shadow: 0 0 14px -3px var(--glow, var(--accent));
  }
  /* targeting-reticle corner brackets on the selected tile */
  .tile.sel::before, .tile.sel::after {
    content: ''; position: absolute; width: 9px; height: 9px;
    border: 2px solid var(--glow, var(--accent));
  }
  .tile.sel::before { top: 3px; left: 3px; border-right: none; border-bottom: none; }
  .tile.sel::after { bottom: 3px; right: 3px; border-left: none; border-top: none; }
  .tile .num { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .tile.sel .num { color: var(--text); }

  .thumb { border-radius: 5px; }
  .thumb.icon { width: 40px; height: 40px; object-fit: contain; background: #10161f; padding: 3px; }

  .tile-color {
    flex-direction: row; gap: 9px; padding: 7px 13px 7px 7px;
    border: 1px solid var(--line); border-radius: 9px;
  }
  .tile-color .thumb.swatch { width: 22px; height: 22px; border: 1px solid rgba(255,255,255,.15); }
  .tile-color .num { font-size: 13px; }

  @keyframes reticle { 0%,100% { box-shadow: 0 0 10px -4px var(--glow, var(--accent)); }
                       50%    { box-shadow: 0 0 18px -2px var(--glow, var(--accent)); } }
  .tile.sel { animation: reticle 2.4s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce) { .tile.sel { animation: none; } }

  @media (max-width: 640px) {
    .app { flex-direction: column; align-items: center; }
    .viewport { position: static; flex-basis: auto; }
    .controls { width: 100%; }
  }
</style>
</head>
<body>
  <header>
    <p class="eyebrow">Hades' Star</p>
    <h1>Corp Badge Builder</h1>
  </header>

  <div class="app">
    <div class="viewport">
      <canvas id="stage" width="300" height="300"></canvas>
      <button class="action" id="download">Download PNG</button>
    </div>

    <div class="controls">
      <div class="field">
        <label>Symbol &middot; SymbolIdx</label>
        <div class="grid-icons" id="symbolGrid" role="radiogroup" aria-label="Symbol"></div>
      </div>
      <div class="field">
        <label>Border &middot; BorderIdx</label>
        <div class="grid-icons" id="borderGrid" role="radiogroup" aria-label="Border"></div>
      </div>
      <div class="field">
        <label>Symbol color &middot; Color1Idx</label>
        <div class="grid-colors" id="color1Grid" role="radiogroup" aria-label="Symbol color"></div>
      </div>
      <div class="field">
        <label>Border color &middot; Color2Idx</label>
        <div class="grid-colors" id="color2Grid" role="radiogroup" aria-label="Border color"></div>
      </div>
    </div>
  </div>

<!-- Shared badge engine (also usable from a Node backend) -->
<script src="badges.js"></script>
<script>
const PRIMARY = 'assets';            // local assets folder (tried first)
const REMOTE = Badges.REMOTE2;       // raw GitHub backstop for thumbnails
function joinBase(base, file) { return base.replace(/\/+$/, '') + '/' + file; }

const stage = document.getElementById('stage');
const ctx = stage.getContext('2d');

const state = { symbol: 0, border: 0, color1: 0, color2: 0 };
const groups = {}; // key -> array of tile buttons
const layer0Colors = Badges.colorData.filter(c => c.layer === 0); // bright colors, in order

// If a local thumbnail 404s, retry once from the remote host.
function thumbFallback(e) {
  const img = e.target;
  if (img.dataset.fb) return;
  img.dataset.fb = '1';
  img.src = joinBase(REMOTE, img.dataset.file);
}

function select(key, idx) {
  state[key] = idx;
  groups[key].forEach(t => {
    const on = (+t.dataset.idx === idx);
    t.classList.toggle('sel', on);
    t.setAttribute('aria-checked', on ? 'true' : 'false');
    t.tabIndex = on ? 0 : -1;      // roving tabindex: Tab lands on the selection
  });
  render();
}

function buildGrid(mountId, source, layer, key, kind, mirror) {
  const mount = document.getElementById(mountId);
  const tiles = [];
  let pos = 0; // position within this group (for mirroring)
  source.forEach((item, idx) => {
    if (item.layer !== layer) return;
    // Border-color picker shows the bright Color-1 swatch/glow/name at the same
    // position (mirror=true); the badge still renders with the real dark value.
    const disp = (kind === 'color' && mirror) ? layer0Colors[pos] : item;
    // Look up the bright color that has the exact same name as the dark one
    const tile = document.createElement('button');
    tile.type = 'button';
    tile.className = 'tile' + (kind === 'color' ? ' tile-color' : '');
    tile.setAttribute('role', 'radio');
    tile.setAttribute('aria-checked', 'false');
    tile.dataset.idx = pos;

    if (kind === 'icon') {
      const img = document.createElement('img');
      img.className = 'thumb icon';
      img.alt = '';
      img.dataset.file = item.iconFile;
      img.src = joinBase(PRIMARY, item.iconFile);
      img.addEventListener('error', thumbFallback);
      tile.appendChild(img);
    } else {
      const sw = document.createElement('span');
      sw.className = 'thumb swatch';
      sw.style.background = 'rgb(' + item.r + ',' + item.g + ',' + item.b + ')';        // real (dark) swatch
      tile.style.setProperty('--glow', 'rgb(' + disp.r + ',' + disp.g + ',' + disp.b + ')'); // selection glow (bright/mirrored)
      tile.appendChild(sw);
    }

    const num = document.createElement('span');
    num.className = 'num';
    num.textContent = kind === 'icon' ? String(idx) : (idx + ' \u2014 ' + item.name);
    tile.appendChild(num);

    tile.addEventListener('click', () => select(key, idx));
    tiles.push(tile);
    mount.appendChild(tile);
    pos++;
  });

  // Arrow-key navigation within the group (acts like a radio group)
  mount.addEventListener('keydown', (e) => {
    if (!['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown'].includes(e.key)) return;
    e.preventDefault();
    const cur = tiles.findIndex(t => +t.dataset.idx === state[key]);
    const step = (e.key === 'ArrowRight' || e.key === 'ArrowDown') ? 1 : -1;
    const next = tiles[(cur + step + tiles.length) % tiles.length];
    select(key, +next.dataset.idx);
    next.focus();
  });

  groups[key] = tiles;
}

async function render() {
  try {
    const badge = await Badges.generateBadge({
      symbolIdx: state.symbol,
      borderIdx: state.border,
      color1Idx: state.color1,
      color2Idx: state.color2,
      assetBase: PRIMARY,
    });
    ctx.clearRect(0, 0, 300, 300);
    ctx.drawImage(badge, 0, 0);
  } catch (err) {
    console.error(err.message);
    ctx.clearRect(0, 0, 300, 300);
    ctx.fillStyle = '#6b7c93';
    ctx.font = '14px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Image not found', 150, 145);
    ctx.fillText('check the console for the filename', 150, 165);
  }
}

buildGrid('symbolGrid', Badges.iconData, 0, 'symbol', 'icon');
buildGrid('borderGrid', Badges.iconData, 1, 'border', 'icon');
buildGrid('color1Grid', Badges.colorData, 0, 'color1', 'color');
buildGrid('color2Grid', Badges.colorData, 1, 'color2', 'color', true);

document.getElementById('download').addEventListener('click', () => {
  stage.toBlob((blob) => {
    if (!blob) { console.error('CORPBADGE_EXPORT_FAILED: toBlob returned null'); return; }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'corpicon.png';
    a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');
});

// Randomize each group on load so every reload shows a new badge
Object.keys(groups).forEach(key => {
  const tiles = groups[key];
  // 1. Pick a random tile from the available buttons
  const randomTile = tiles[Math.floor(Math.random() * tiles.length)];
  // 2. Pass its ACTUAL data-idx value to the select function
  select(key, +randomTile.dataset.idx);
});
</script>
</body>
</html>
